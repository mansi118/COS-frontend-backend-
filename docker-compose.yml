services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cos_dashboard
      POSTGRES_USER: cos
      POSTGRES_PASSWORD: neuraledge2026
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cos -d cos_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
